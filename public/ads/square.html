<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 1200px;
    font-family: 'DM Sans', sans-serif;
    background: #0B0D12;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  .bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(99,102,241,0.07) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  .glow {
    position: absolute; border-radius: 50%; filter: blur(140px); pointer-events: none;
  }
  .glow-1 { width: 550px; height: 550px; background: rgba(99,102,241,0.14); top: 180px; left: -120px; }
  .glow-2 { width: 400px; height: 400px; background: rgba(129,140,248,0.08); bottom: 80px; right: -80px; }

  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    height: 100%; padding: 60px;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 36px;
  }
  .logo-text { display: flex; align-items: baseline; gap: 2px; }
  .logo-text .bold {
    font-size: 18px; font-weight: 700; letter-spacing: -0.03em; color: #fff;
  }
  .logo-text .accent {
    font-size: 18px; font-weight: 500; letter-spacing: -0.02em; color: #818CF8;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 64px; line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  h1 em { font-style: italic; color: #A5B4FC; }

  .sub {
    font-size: 19px; color: rgba(255,255,255,0.55);
    line-height: 1.55; font-weight: 300;
    max-width: 520px; margin-bottom: 0;
  }

  .screens {
    flex: 1; position: relative;
    margin-top: 40px;
  }

  .screen {
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    position: absolute;
  }
  .screen img {
    display: block; width: 100%; height: 100%;
    object-fit: cover; object-position: top left;
  }

  .screen-dash {
    width: 580px; height: 420px;
    top: 0; left: 0;
    transform: perspective(900px) rotateY(3deg) rotateX(-1deg);
  }
  .screen-dash::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 35%, rgba(11,13,18,0.5) 85%, rgba(11,13,18,0.9) 100%);
  }

  .screen-chat {
    width: 540px; height: 400px;
    top: 130px; right: 0; z-index: 2;
    transform: perspective(900px) rotateY(-2deg) rotateX(-1deg);
  }
  .screen-chat::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(225deg, transparent 40%, rgba(11,13,18,0.4) 80%, rgba(11,13,18,0.7) 100%);
  }

  .bottom {
    display: flex; align-items: center; justify-content: flex-end;
    position: relative; z-index: 3;
    padding-top: 16px;
  }

  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 16px 34px; border-radius: 10px;
    background: #6366F1; color: #fff;
    font-size: 16px; font-weight: 600;
    box-shadow: 0 8px 32px rgba(99,102,241,0.3);
  }
</style>
</head>
<body>
  <div class="bg-dots"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="content">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#6366F1"/>
        <path d="M20 5L34 15V29H26L20 36L14 29H6V15L20 5Z" fill="white"/>
        <rect x="12" y="17.5" width="16" height="2.5" rx="1.25" fill="#6366F1"/>
        <rect x="12" y="22" width="11" height="2.5" rx="1.25" fill="#6366F1"/>
      </svg>
      <div class="logo-text">
        <span class="bold">ape</span>
        <span class="accent">platform</span>
      </div>
    </div>

    <h1>Seu condomínio<br>merece mais que um<br>grupo de <em>WhatsApp</em></h1>
    <p class="sub">Chatbot que responde moradores 24h, ata automática e painel completo pro síndico.</p>

    <div class="screens">
      <div class="screen screen-dash">
        <img src="/preview-dashboard.png" alt="">
      </div>
      <div class="screen screen-chat">
        <img src="/preview-chatbot.png" alt="">
      </div>
    </div>

    <div class="bottom">
      <div class="cta">Agendar demo gratuita &#8594;</div>
    </div>
  </div>
</body>
</html>
