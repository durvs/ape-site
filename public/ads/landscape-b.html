<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 628px;
    font-family: 'DM Sans', sans-serif;
    background: #F8FAFC;
    color: #0F172A;
    overflow: hidden;
    position: relative;
  }

  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #6366F1, #818CF8, #6366F1);
  }

  .content {
    position: relative; z-index: 2;
    display: flex; height: 100%;
    padding: 52px 60px 48px;
    gap: 48px; align-items: center;
  }

  .left {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 32px;
  }
  .logo-text { display: flex; align-items: baseline; gap: 2px; }
  .logo-text .bold {
    font-size: 17px; font-weight: 700; letter-spacing: -0.03em; color: #0F172A;
  }
  .logo-text .accent {
    font-size: 17px; font-weight: 500; letter-spacing: -0.02em; color: #6366F1;
  }

  .pain {
    font-size: 13px; color: #6366F1; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 50px; line-height: 1.06;
    letter-spacing: -0.02em;
    margin-bottom: 20px; color: #0F172A;
  }
  h1 em { font-style: italic; color: #6366F1; }

  .sub {
    font-size: 16px; color: #64748B;
    line-height: 1.6; font-weight: 300;
    max-width: 380px; margin-bottom: 32px;
  }

  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: 10px;
    background: #6366F1; color: #fff;
    font-size: 15px; font-weight: 600;
    width: fit-content;
    box-shadow: 0 8px 32px rgba(99,102,241,0.25);
  }
  .cta-note {
    font-size: 12px; color: #94A3B8; margin-top: 10px;
  }

  .right {
    width: 480px; flex-shrink: 0;
    position: relative; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }

  .screen {
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
    width: 440px; height: 360px;
  }
  .screen img {
    display: block; width: 100%; height: 100%;
    object-fit: cover; object-position: top left;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="left">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="10" fill="#6366F1"/>
          <path d="M20 5L34 15V29H26L20 36L14 29H6V15L20 5Z" fill="white"/>
          <rect x="12" y="17.5" width="16" height="2.5" rx="1.25" fill="#6366F1"/>
          <rect x="12" y="22" width="11" height="2.5" rx="1.25" fill="#6366F1"/>
        </svg>
        <div class="logo-text">
          <span class="bold">ape</span>
          <span class="accent">platform</span>
        </div>
      </div>

      <div class="pain">Para síndicos e administradoras</div>
      <h1>Morador pergunta.<br><em>A IA responde.</em><br>Você descansa.</h1>
      <p class="sub">O chatbot atende 24h com base no regimento, atas e circulares do condomínio. Sem inventar resposta.</p>
      <div class="cta">Agendar demo gratuita &#8594;</div>
      <div class="cta-note">30 min. Sem compromisso.</div>
    </div>
    <div class="right">
      <div class="screen">
        <img src="/preview-chatbot.png" alt="">
      </div>
    </div>
  </div>
</body>
</html>
